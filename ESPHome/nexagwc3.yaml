# ─────────────────────────────────────────────────────────────────────────────
# ESPHome configuration for ESP32-C3 + CC1101 → Nexa NBA-001 gateway
#
# The NBA-001 is internally a Hideki TS04 / TFA TS34C chip. It broadcasts
# temperature and humidity at 433.92 MHz using OOK with Differential
# Manchester Coding (DMC). See hideki_nba001.h for full protocol details.
#
# Each received packet is published to the "nexa_rx" text sensor as JSON:
#   {"id":"0x2A0E","ch":2,"rc":10,"t":23.3,"h":25,"batt":true}
#
# Sensor ID mapping is done entirely in Home Assistant (no reflash needed).
# See readme.md for HA trigger-based template sensor examples.
#
# ── CC1101 wiring to ESP32-C3 (e.g. "C3 Supermini") ─────────────────────────
#   CC1101 pin   ESP32-C3 pin
#   VCC          3.3 V
#   GND          GND
#   MOSI (SI)    GPIO4
#   MISO (SO)    GPIO3
#   SCK  (SCLK)  GPIO5
#   CSN  (CS)    GPIO7
#   GDO0         GPIO6   ← demodulated OOK data, feeds remote_receiver
#   GDO2         not connected (not required by the built-in component)
# ─────────────────────────────────────────────────────────────────────────────

# (no substitutions needed – sensor mapping is done in Home Assistant)

# ─────────────────────────────────────────────────────────────────────────────
esphome:
  name: nexagwc3
  friendly_name: NexaGwC3
  # Include the Hideki/NBA-001 decoder (header-only, no extra build step)
  includes:
    - hideki_nba001.h
  on_boot:
    priority: -100   # run after all components are initialised
    then:
      - cc1101.begin_rx: cc1101_radio
      - lambda: |-
          // Publish an empty JSON object so HA shows the sensors as
          // "available" immediately after boot, before any RF packet arrives.
          id(nexa_rx).publish_state("{}");
          id(nexa_fire_rx).publish_state("{}");

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  # Disable the default 15-minute "reboot if no HA client connected" timer.
  # Without this, any API glitch (e.g. safe_mode NVS write) that breaks the
  # connection will cause the device to reboot exactly 15 minutes after boot.
  # A gateway like this should never reboot just because HA is temporarily
  # unavailable or slow to reconnect.
  reboot_timeout: 0s
  encryption:
    key: "wK4o6AKpQYfaxJ16s49a5e/Sf9mzy2dcIKnWu9D1dJU="

ota:
  - platform: esphome
    password: "89d0adc84635d78036eedea1ff47ed77"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # post_connect_roaming: false # default true, but can cause long WiFi blackouts on some APs when the signal is weak
  # Disable modem sleep: prevents ~100 ms WiFi blackouts that can drop the
  # API TCP keepalive. Costs ~20 mA extra but this is a mains-powered gateway.
  power_save_mode: none
  ap:
    ssid: "NexaGwC3 Fallback"
    password: "nexagwfallback"

captive_portal:

# ─────────────────────────────────────────────────────────────────────────────
# SPI bus – C3 Supermini pin assignment
# ─────────────────────────────────────────────────────────────────────────────
spi:
  clk_pin:  GPIO5
  mosi_pin: GPIO4
  miso_pin: GPIO3

# ─────────────────────────────────────────────────────────────────────────────
# CC1101 radio – built-in ESPHome component (merged via PR #11849)
#   frequency      : 433.92 MHz
#   filter_bandwidth: 203 kHz  (closest supported value ≥ 200 kHz)
#   modulation_type: ASK/OOK
#   GDO0           : GPIO6  (demodulated OOK data, shared with remote_receiver)
# ─────────────────────────────────────────────────────────────────────────────
cc1101:
  id: cc1101_radio
  cs_pin: GPIO7
  gdo0_pin:
    number: GPIO6
    allow_other_uses: true  # shared with remote_receiver
  frequency: 433.92MHz
  filter_bandwidth: 203kHz
  modulation_type: ASK/OOK
  sync_mode: None
  carrier_sense_above_threshold: false

sensor: []

binary_sensor: []


text_sensor:
  # Every received packet is published here as JSON.
  # Home Assistant trigger-based template sensors read this and split by "id".
  - platform: template
    name: "Nexa RX"
    id: nexa_rx
    icon: mdi:radio-tower

  # Every received FS-558 alarm packet is published here as JSON.
  # Fields:
  #   id    – 6-digit uppercase hex device address, e.g. "0x680005"
  #           (bits[23:1] of the 24-bit packet; unique per alarm unit)
  #   state – bit[0] of the packet
  #           CONFIRMED polarity (test-button verified):
  #             state=false → alarm ACTIVE / sounding
  #             state=true  → alarm cleared / idle
  #
  # Examples:
  #   {"id":"0x680005","state":false}   ← alarm active  (confirmed)
  #   {"id":"0x680005","state":true}    ← alarm cleared (inferred)
  #
  # Home Assistant trigger-based template binary sensors read this.
  - platform: template
    name: "Nexa Fire RX"
    id: nexa_fire_rx
    icon: mdi:smoke-detector-alert

