# ─────────────────────────────────────────────────────────────────────────────
#
# ── FS-558 smoke alarm mapping ───────────────────────────────────────────────
# The FS-558 uses a custom 24-bit OOK protocol – NOT ESPHome’s Nexa decoder.
# Add one block per alarm. Replace 0x680005 / 0x7ABCDE with your real IDs
# (visible in the ESPHome log or as the "id" field in HA state changes).
#
# State polarity CONFIRMED: state=false → alarm active, state=true → idle.
# Use  {{ not d.state }}  so that HA binary_sensor is true when alarming.
#
#   template:
#     - trigger:
#         - platform: state
#           entity_id: sensor.nexagwc3_nexa_fire_rx
#       binary_sensor:
#         - name: "Nexa Brandvarnare 1"
#           device_class: smoke
#           icon: mdi:smoke-detector-alert
#           state: >
#             {% set d = trigger.to_state.state | from_json %}
#             {% if d.id == '0x680005' %} {{ not d.state }}
#             {% else %}                 {{ this.state }}
#             {% endif %}
#         - name: "Nexa Brandvarnare 2"
#           device_class: smoke
#           icon: mdi:smoke-detector-alert
#           state: >
#             {% set d = trigger.to_state.state | from_json %}
#             {% if d.id == '0x280005' %} {{ not d.state }}
#             {% else %}                  {{ this.state }}
#             {% endif %}
#         - name: "Nexa Brandvarnare 3"
#           device_class: smoke
#           icon: mdi:smoke-detector-alert
#           state: >
#             {% set d = trigger.to_state.state | from_json %}
#             {% if d.id == '0x100005' %} {{ not d.state }}
#             {% else %}                  {{ this.state }}
#             {% endif %}
#         - name: "Nexa Brandvarnare 4"
#           device_class: smoke
#           icon: mdi:smoke-detector-alert
#           state: >
#             {% set d = trigger.to_state.state | from_json %}
#             {% if d.id == '0x080005' %} {{ not d.state }}
#             {% else %}                  {{ this.state }}
#             {% endif %}
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Remote receiver – reads demodulated OOK from CC1101 GDO2 (GPIO4)
#
# Hideki / NBA-001 timing:
#   short pulse ≈ 520 µs  (half clock period)
#   long  pulse ≈ 1040 µs (full clock period)
#   idle gap    > 4 ms    (between repetitions / sensors)
# ─────────────────────────────────────────────────────────────────────────────
remote_receiver:
  pin:
    number: GPIO6
    mode: input
    allow_other_uses: true  # shared with cc1101 gdo0_pin
  filter: 100us
  idle:   5ms
  buffer_size: 10kb
  # ── Diagnostics: restore  dump: [raw]  to capture new alarm IDs, then
  #    change back to []  once all IDs are known. ──────────────────────
  dump: []

  on_raw:
    - lambda: |-
        // ─── Change-detection + 5-minute heartbeat ─────────────────────────
        // Publish on first reading (boot), when a value changes, or every
        // 5 minutes regardless of change (keep-alive / HA watchdog).
        static std::map<uint16_t, std::string>  nba_last_json;
        static std::map<uint16_t, uint32_t>     nba_last_ms;
        static std::map<uint32_t, std::string>  fs_last_json;
        static std::map<uint32_t, uint32_t>     fs_last_ms;
        static const uint32_t HEARTBEAT_MS = 5UL * 60UL * 1000UL;  // 5 minutes

        // ── Try NBA-001 temperature/humidity first ─────────────────────────
        auto pkt = nba001_decode(x);
        if (pkt.valid) {
            std::string json = nba001_to_json(pkt);
            uint16_t    sid  = pkt.sensor_id;
            bool first_time  = (nba_last_ms.count(sid) == 0);
            bool changed     = !first_time && (json != nba_last_json[sid]);
            bool timeout     = !first_time && (millis() - nba_last_ms[sid] >= HEARTBEAT_MS);
            if (first_time || changed || timeout) {
                id(nexa_rx).publish_state(json.c_str());
                nba_last_json[sid] = json;
                nba_last_ms[sid]   = millis();
            }
            return;
        }
        // ── Try FS-558 smoke alarm ──────────────────────────────────────
        auto fpkt = fs558_decode(x);
        if (fpkt.valid) {
            std::string json = fs558_to_json(fpkt);
            uint32_t    dev  = fpkt.device;
            bool first_time  = (fs_last_ms.count(dev) == 0);
            bool changed     = !first_time && (json != fs_last_json[dev]);
            bool timeout     = !first_time && (millis() - fs_last_ms[dev] >= HEARTBEAT_MS);
            if (first_time || changed || timeout) {
                id(nexa_fire_rx).publish_state(json.c_str());
                fs_last_json[dev] = json;
                fs_last_ms[dev]   = millis();
            }
        }

